services:
  ocr-engine:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ocr-engine
    restart: unless-stopped
    env_file:
      - ./ocr-engine.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - paddle-cache:/root/.paddlex
      - ocr-tmp:/app/tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  paddle-cache:
  ocr-tmp:
